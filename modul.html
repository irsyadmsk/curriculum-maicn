<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modul Ajar — Curriculum OS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
.modul-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 80px; }
.modul-card { background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; cursor: pointer; }
.modul-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); border-color: var(--accent); }
.modul-thumb { height: 160px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.modul-thumb::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 20px 20px; }
.modul-icon { font-size: 3rem; color: var(--accent); position: relative; z-index: 2; }
.modul-info { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
.m-tag { font-size: 0.7rem; font-weight: 800; color: var(--primary); background: var(--bg); padding: 6px 12px; border-radius: 20px; align-self: flex-start; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.m-title { font-size: 1.2rem; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; line-height: 1.3; }
.m-guru { margin-top: auto; padding-top: 16px; border-top: 1px dashed var(--border); font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }

/* Filter */
.filter-bar { display: flex; gap: 16px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 8px; justify-content: center; }
.filter-select { padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border); font-family: inherit; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); background: var(--surface); outline: none; transition: 0.3s; cursor: pointer; }
.filter-select:hover { border-color: var(--primary); }
</style>
<script src="data.js"></script>
<script src="assets/app.js"></script>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-brand">
    <img src="assets/iconmaicn.png" alt="Logo">
    MA ICN
  </a>
  <button class="nav-toggle" id="nav-toggle">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Beranda</a>
    <a href="profil.html">Profil</a>
    <a href="struktur.html">Struktur</a>
    <a href="kalender.html">Kalender</a>
    <a href="prota.html">Prota</a>
    <a href="posem.html">Posem</a>
    <a href="modul.html" class="active">Modul</a>
    <a href="dokumen.html">Dokumen</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 class="animate-up">Pustaka Modul Ajar</h1>
    <p class="animate-up delay-100">Kumpulan perangkat ajar publik dan modul panduan belajar untuk peserta didik.</p>
  </div>
</div>

<div class="container">
  
  <div class="filter-bar animate-up delay-200">
    <select class="filter-select"><option>Semua Kelas</option><option>Kelas X</option></select>
    <select class="filter-select"><option>Semua Rumpun</option><option>MIPA</option><option>PAI</option><option>Bahasa</option></select>
  </div>

  <div class="modul-grid" id="modul-grid">
    <!-- Injected by JS -->
  </div>

</div>

<footer>
  <div class="container">
    <strong id="footer-madrasah">MA Insan Cendekia Nusantara Purwakarta</strong>
    Pusat Informasi Akademik & Kurikulum
  </div>
</footer>

<div class="modal-overlay" id="modal-preview">
  <div class="modal-box" style="max-width: 800px; width: 95%;">
    <button class="btn-close" onclick="window.AppUtils.closeModal('modal-preview')">&times;</button>
    <h3 id="pv-title" style="font-size: 1.5rem; color: var(--primary); margin-bottom: 24px; padding-right: 20px;">Preview Modul</h3>
    <div style="background: var(--bg); border-radius: var(--radius-md); padding: 40px; text-align: center; border: 1px solid var(--border);">
      <div style="font-size: 4rem; margin-bottom: 16px;">📚</div>
      <p style="color: var(--text-secondary); font-weight: 600;">(Simulasi Dokumen Embed PDF / GDocs)</p>
    </div>
    <div style="margin-top: 24px; text-align: center;">
      <button class="btn btn-primary" onclick="window.AppUtils.closeModal('modal-preview')">Tutup Pratinjau</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const MD = window.MASTER_DATA;
  if (!MD) return;

  const grid = document.getElementById('modul-grid');
  let html = '';

  MD.distribusi_jp.forEach((r, i) => {
    let guru = r.guru;
    if(guru.includes('Rekrutmen')) guru = "Dalam Penugasan";
    
    html += `
    <div class="modul-card animate-up" onclick="window.AppUtils.openModal('modal-preview'); document.getElementById('pv-title').innerText = 'Modul: ${r.mapel}';">
      <div class="modul-thumb">
        <div class="modul-icon">📖</div>
      </div>
      <div class="modul-info">
        <span class="m-tag">${r.kelompok}</span>
        <h3 class="m-title">${r.mapel}</h3>
        <div class="m-guru">👤 ${guru}</div>
      </div>
    </div>
    `;
  });

  grid.innerHTML = html;
});
</script>
</body>
</html>
