<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Program Tahunan — Curriculum OS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
/* Aesthetic Timeline */
.timeline-wrap { position: relative; max-width: 900px; margin: 0 auto; padding: 40px 0; }
.timeline-wrap::before { content: ''; position: absolute; left: 50%; transform: translateX(-50%); top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--bg) 0%, var(--primary-light) 50%, var(--bg) 100%); }

.timeline-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; position: relative; width: 100%; }
.timeline-item:nth-child(even) { flex-direction: row-reverse; }

.timeline-content { width: 45%; background: var(--surface); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-md); position: relative; transition: 0.3s; border: 1px solid var(--border); }
.timeline-content:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(26, 71, 49, 0.15); border-color: var(--accent); }

.timeline-item:nth-child(odd) .timeline-content::after { content: ''; position: absolute; right: -12px; top: 32px; width: 24px; height: 24px; background: var(--surface); transform: rotate(45deg); border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
.timeline-item:nth-child(even) .timeline-content::after { content: ''; position: absolute; left: -12px; top: 32px; width: 24px; height: 24px; background: var(--surface); transform: rotate(-135deg); border-top: 1px solid var(--border); border-right: 1px solid var(--border); }

.timeline-node { position: absolute; left: 50%; top: 32px; transform: translate(-50%, -50%); width: 24px; height: 24px; border-radius: 50%; background: var(--surface); border: 6px solid var(--accent); z-index: 2; box-shadow: 0 0 0 4px var(--bg); }
.timeline-node.active-node { border-color: var(--primary); background: var(--accent); }

.t-month { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
.t-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; line-height: 1.4; }
.t-meta { display: flex; gap: 16px; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 16px; flex-wrap: wrap; }
.t-meta span { display: flex; align-items: center; gap: 6px; }

.badge-status { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
.bs-Berlangsung { background: #dcfce7; color: #166534; }
.bs-Terlaksana { background: #e0f2fe; color: #0369a1; }
.bs-Terjadwal { background: #fef3c7; color: #b45309; }
.bs-Tentatif { background: #f1f5f9; color: #475569; }

@media (max-width: 768px) {
  .timeline-wrap::before { left: 30px; }
  .timeline-item { flex-direction: column; align-items: flex-start; }
  .timeline-item:nth-child(even) { flex-direction: column; }
  .timeline-content { width: calc(100% - 60px); margin-left: 60px; }
  .timeline-item:nth-child(odd) .timeline-content::after, .timeline-item:nth-child(even) .timeline-content::after { left: -10px; top: 32px; transform: rotate(-135deg); border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
  .timeline-node { left: 30px; top: 32px; transform: translate(-50%, -50%); }
}
</style>
<script src="data.js"></script>
<script src="assets/app.js"></script>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-brand">
    <img src="assets/iconmaicn.png" alt="Logo">
    MA ICN
  </a>
  <button class="nav-toggle" id="nav-toggle">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Beranda</a>
    <a href="profil.html">Profil</a>
    <a href="struktur.html">Struktur</a>
    <a href="kalender.html">Kalender</a>
    <a href="prota.html" class="active">Prota</a>
    <a href="posem.html">Posem</a>
    <a href="modul.html">Modul</a>
    <a href="dokumen.html">Dokumen</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 class="animate-up">Program Tahunan</h1>
    <p class="animate-up delay-100">Pemetaan strategi dan agenda besar madrasah dalam merajut pendidikan unggul.</p>
  </div>
</div>

<div class="container">
  <div class="timeline-wrap" id="timeline-container"></div>
</div>

<footer>
  <div class="container">
    <strong id="footer-madrasah">MA Insan Cendekia Nusantara Purwakarta</strong>
    Pusat Informasi Akademik & Kurikulum
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const MD = window.MASTER_DATA;
  if (!MD || !MD.program_tahunan) return;

  const container = document.getElementById('timeline-container');
  let html = '';
  let currentMonth = '';

  MD.program_tahunan.forEach((item, index) => {
    let showMonth = item.bulan !== currentMonth;
    if (showMonth) currentMonth = item.bulan;

    let nodeClass = item.status.includes('Berlangsung') ? 'active-node' : '';
    let bsClass = 'bs-' + item.status.replace(/[^a-zA-Z]/g, '');

    html += `
      <div class="timeline-item animate-up delay-${(index % 3)*100}">
        ${showMonth ? `<div class="timeline-node ${nodeClass}"></div>` : `<div class="timeline-node" style="border-width:3px; width:16px; height:16px;"></div>`}
        <div class="timeline-content">
          ${showMonth ? `<div class="t-month">${item.bulan}</div>` : ''}
          <div class="t-title">${item.kegiatan}</div>
          <div class="t-meta">
            <span>👤 ${item.penanggung_jawab}</span>
            <span>🕒 <span style="font-family:'DM Mono', monospace;">${item.waktu}</span></span>
          </div>
          <span class="badge-status ${bsClass}">${item.status}</span>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
});
</script>
</body>
</html>
